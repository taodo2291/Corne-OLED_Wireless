[main]
# Toggle our custom Colemak-DH layout on/off
[meta+alt+shift]
t = toggle(colemakdh)


[colemakdh]
# ----------------------------------------------------
# THUMB KEYS (4-thumb layout + Normal Space)
# ----------------------------------------------------
# Left Thumbs
leftmeta = layer(nav_layer)              # Outer Left -> NAV Layer
leftalt = overload(fn_layer, enter)      # Inner Left -> FN / Enter
# Space is just space!

# Right Thumbs
rightalt = overload(num_layer, f24)      # Inner Right -> NUM
rightmeta = layer(shift)                        # Outer Right -> SHIFT

# ----------------------------------------------------
# ALPHAS (Colemak-DH)
# ----------------------------------------------------
# Top Row
q = q
w = w
e = f
r = p
t = b
y = j
u = l
i = u
o = y
p = '

# Home Row (Home Row Mods!)
# syntax: overloadt(modifier, tap_letter, timeout_ms)
a = overloadt(meta, a, 200)
s = overloadt(alt, r, 200)
d = overloadt(shift, s, 200)
f = overloadt(control, t, 200)
g = g

h = m
j = overloadt(control, n, 200)
k = overloadt(shift, e, 200)
l = overloadt(alt, i, 200)
semicolon = overloadt(meta, o, 200)

# Bottom Row
z = z
x = x
c = c
v = d
b = v
n = k
m = h
comma = ,
dot = .
slash = /


# ----------------------------------------------------
# COMBOS (Chords)
# ----------------------------------------------------
# In keyd, chords are defined directly inside the layer!
# -- Vertical Combos --
# Pipe: QWERTY 'i' and '.' pressed together
i+. = S-\

# -- Right Hand Horizontal Combos --
# Backspace / Delete
u+i = backspace
i+o = delete
# ( lpar: Shift + 9
j+k = S-9
# ) rpar: Shift + 0
k+l = S-0
# [ lbkt: [
m+, = [
# ] rbkt: ]
,+. = ]

# -- Left Hand Horizontal Combos --
# Esc / Tab
w+e = esc
s+d = tab
# Copy: Ctrl + C
x+c = C-c
# Paste: Ctrl + V
c+v = C-v

# ----------------------------------------------------
# LAYERS
# ----------------------------------------------------

[nav_layer]
# Navigation cluster mapped to the physical QWERTY keys
# that correspond to your Colemak positions
y = pagedown
u = backspace
i = up
o = delete

h = pageup
j = left
k = down
l = right
semicolon = enter

[num_layer]
# Left hand numbers
a = layer(meta)
s = layer(alt)
d = layer(shift)
f = layer(control)

q = 7
w = 8
e = 9
r = 0

z = 1
x = 2
c = 3
v = 4
b = 5
t = 6

[fn_layer]
